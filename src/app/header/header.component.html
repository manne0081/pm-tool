<div class="background private" *ngIf="isPrivate"><p>Private Header</p>
    
</div>

<div class="background public" *ngIf="!isPrivate"><p>Public Header</p>
    
</div>

<div class="breadcrumb" *ngIf="isPrivate">
    <button (click)="setIsPrivate(false)">Logout</button>
</div>

<div class="breadcrumb" *ngIf="!isPrivate">
    <button (click)="setIsPrivate(true)">Login</button>
</div>
