<app-header></app-header>

<div class="row">

    <div class="col-1 navigation">
        <app-navigation></app-navigation>
    </div>

    <div class="col-1 quicklinks">
        <app-quicklinks></app-quicklinks>
    </div>

    <div class="col-10 content">
        <div class="content-header-background">
            <div class="content-header-container">
                <p>{{objectName}}</p>
            </div>
        </div>

        <div class="content-value">
            
            <!-- CONTENT ROW I -->
            <div class="row-content">
                <div class="col-3">
                    <label for="">Nummer</label>
                    <input type="text" value="{{number}}" disabled class="disabled">
                </div>
            
                <div class="col-3">
                    <label for="">Vorname</label>
                    <input type="text" [(ngModel)]="firstName">
                </div>

                <div class="col-3">
                    <label for="">Nachname</label>
                    <input type="text" [(ngModel)]="lastName">
                </div>

                <div class="col-3">
                    <label for="">Keine Ahnung</label>
                    <input type="text">
                </div>                                
            </div>

            <!-- CONTENT ROW II -->
            <div class="row-content">
                <div class="col-3">
                    <label for="">Straße</label>
                    <input type="text" [(ngModel)]="street">
                </div>
            
                <div class="col-3">
                    <label for="">Hausnummer</label>
                    <input type="text" [(ngModel)]="houseNumber">
                </div>

                <div class="col-3">
                    <label for="">PLZ</label>
                    <input type="text" [(ngModel)]="postCode">
                </div>

                <div class="col-3">
                    <label for="">Ort</label>
                    <input type="text" [(ngModel)]="city">
                </div>                                
            </div>

            <!-- CONTENT ROW III -->
            <div class="row-content">
                <div class="col-2">
                    <label for="">Straße</label>
                    <input type="text" [(ngModel)]="street">
                </div>
            
                <div class="col-2">
                    <label for="">Hausnummer</label>
                    <input type="text" [(ngModel)]="houseNumber">
                </div>

                <div class="col-2">
                    <label for="">PLZ</label>
                    <input type="text" [(ngModel)]="postCode">
                </div>

                <div class="col-2">
                    <label for="">Ort</label>
                    <input type="text" [(ngModel)]="city">
                </div>

                <div class="col-2">
                    <label for="">Ort</label>
                    <input type="text" [(ngModel)]="city">
                </div>

                <div class="col-2">
                    <label for="">Ort</label>
                    <input type="text" [(ngModel)]="city">
                </div>     
            </div>

            <!-- CONTENT ROW IV -->
            <div class="row-content">
                <div class="col-4">
                    <label for="">Straße</label>
                    <input type="text" [(ngModel)]="street">
                </div>
            
                <div class="col-4">
                    <label for="">Hausnummer</label>
                    <input type="text" [(ngModel)]="houseNumber">
                </div>

                <div class="col-4">
                    <label for="">PLZ</label>
                    <input type="text" [(ngModel)]="postCode">
                </div>
    
            </div>
            
            <hr>
            <div style="height: 100px;"></div>



            <hr>
            <div style="height: 100px;"></div>



        </div>

    </div>

</div>
