<!-- Public -->
<div class="background public" *ngIf="!isPrivate"><p routerLink="/">Public Header</p>
    
</div>

<div class="breadcrumb-container" *ngIf="!isPrivate">
    <div class="breadcrumb-item item-1"></div>
    <div class="breadcrumb-item item-2"></div>
    <div class="breadcrumb-item item-3">
        <button class="button" *ngIf="isVisible" routerLink="/login">Login</button>
    </div>
</div>


<!-- Private -->
<div class="background private" *ngIf="isPrivate"><p>Private Header</p>
    
</div>

<div class="breadcrumb-container" *ngIf="isPrivate">
    <div class="breadcrumb-item item-1"></div>
    <div class="breadcrumb-item item-2"></div>
    <div class="breadcrumb-item item-3">
        <button class="button" *ngIf="isVisible" routerLink="">Logout</button>
    </div>
</div>
